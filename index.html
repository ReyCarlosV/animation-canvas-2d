<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Canvas Glass App</title>

  <link rel="icon" type="image/png" href="assets/image/buble.png">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- 🔷 NAVBAR -->
  <nav class="navbar navbar-dark bg-dark bg-opacity-75 backdrop-blur">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🎨 Canvas Glass App</span>
    </div>
  </nav>

  <!-- 🔷 CONTENIDO -->
  <div class="container mt-4">

    <div class="glass p-4 mb-4">

      <div class="row align-items-end">

        <div class="col-md-2 mb-3">
          <label class="form-label text-truncate">Cantidad</label>
          <input type="range" id="cantidad" class="form-range" min="1" max="50" value="10">
          <span id="valorCantidad">10</span>
        </div>

        <div class="col-md-2 mb-3">
          <label class="form-label text-truncate">Ancho</label>
          <input type="range" id="ancho" class="form-range" min="200" max="1000" value="600">
          <span id="valorAncho">600</span>
        </div>

        <div class="col-md-2 mb-3">
          <label class="form-label text-truncate">Alto</label>
          <input type="range" id="alto" class="form-range" min="200" max="600" value="400">
          <span id="valorAlto">400</span>
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Modo de Gravedad</label>
          <select id="efecto" class="form-select bg-dark text-white border-secondary">
            <option value="baja-gravedad">Gravedad baja (Aleatorio)</option>
            <option value="sup-izq">Aventar desde Arriba-Izquierda</option>
            <option value="sup-der">Aventar desde Arriba-Derecha</option>
            <option value="inf-izq">Aventar desde Abajo-Izquierda</option>
            <option value="inf-der">Aventar desde Abajo-Derecha</option>
          </select>
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Efecto Visual</label>
          <select id="estela" class="form-select bg-dark text-white border-secondary">
            <option value="sin-estela">Normal (Sin estela)</option>
            <option value="con-estela">Con Estela (Rastro)</option>
          </select>
        </div>

      </div>
    </div>

    <!-- Canvas -->
    <div class="d-flex justify-content-center">
      <canvas id="canvas" class="glass"></canvas>
    </div>

  </div>

  <!-- 🔷 FOOTER -->
  <footer class="text-center mt-4 p-3 glass">
    <p>Desarrollado por Carlos | Programación Web 🎓</p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
